services:
  api:
    build: .
    image: send-to-kindle:local
    command: ["api", "--host", "0.0.0.0", "--port", "6122"]
    env_file:
      - .env
    ports:
      - "6122:6122"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./config/users.yaml:/app/config/users.yaml:ro
    depends_on:
      - worker

  worker:
    build: .
    image: send-to-kindle:local
    command: ["worker"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./config/users.yaml:/app/config/users.yaml:ro
