services:
  app:
    image: ${STK_IMAGE:-ghcr.io/tmargo101/send-to-kindle:latest}
    command: ["api", "--host", "0.0.0.0", "--port", "6122"]
    env_file:
      - .env
    ports:
      - "6122:6122"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./config/users.yaml:/app/config/users.yaml:ro
    restart: unless-stopped
